<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="45%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#061228"/>
      <stop offset="100%" stop-color="#010408"/>
    </radialGradient>
    <filter id="neon" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="b2"/>
      <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tglow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" result="b"/>
      <feFlood flood-color="#1060ff" flood-opacity="1" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="b2"/>
      <feFlood flood-color="#70b8ff" flood-opacity="0.7" result="c2"/>
      <feComposite in="c2" in2="b2" operator="in" result="g2"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="g2"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="tg" x1="0%" y1="0%" x2="5%" y2="100%">
      <stop offset="0%" stop-color="#b0d8ff"/>
      <stop offset="20%" stop-color="#60a8ff"/>
      <stop offset="55%" stop-color="#1858d8"/>
      <stop offset="85%" stop-color="#0a38a0"/>
      <stop offset="100%" stop-color="#1850c0"/>
    </linearGradient>
    <clipPath id="cc"><circle cx="256" cy="256" r="248"/></clipPath>
  </defs>

  <circle cx="256" cy="256" r="256" fill="#010510"/>
  <circle cx="256" cy="256" r="250" fill="url(#bg)"/>

  <!-- Anillo neon exterior grueso -->
  <circle cx="256" cy="256" r="243" fill="none" stroke="#0075ff" stroke-width="11" filter="url(#neon)" opacity="0.95"/>
  <!-- Anillo interior delgado -->
  <circle cx="256" cy="256" r="226" fill="none" stroke="#0060ee" stroke-width="2" filter="url(#neon)" opacity="0.6"/>

  <!-- Ticks del anillo -->
  <g clip-path="url(#cc)" stroke="#0090ff" stroke-width="2" opacity="0.55">
    <line x1="256" y1="10" x2="256" y2="26" transform="rotate(0 256 256)"/>
    <line x1="256" y1="10" x2="256" y2="20" transform="rotate(15 256 256)"/>
    <line x1="256" y1="10" x2="256" y2="26" transform="rotate(30 256 256)"/>
    <line x1="256" y1="10" x2="256" y2="20" transform="rotate(45 256 256)"/>
    <line x1="256" y1="10" x2="256" y2="26" transform="rotate(60 256 256)"/>
    <line x1="256" y1="10" x2="256" y2="20" transform="rotate(75 256 256)"/>
    <line x1="256" y1="10" x2="256" y2="26" transform="rotate(90 256 256)"/>
    <line x1="256" y1="10" x2="256" y2="20" transform="rotate(105 256 256)"/>
    <line x1="256" y1="10" x2="256" y2="26" transform="rotate(120 256 256)"/>
    <line x1="256" y1="10" x2="256" y2="20" transform="rotate(135 256 256)"/>
    <line x1="256" y1="10" x2="256" y2="26" transform="rotate(150 256 256)"/>
    <line x1="256" y1="10" x2="256" y2="20" transform="rotate(165 256 256)"/>
    <line x1="256" y1="10" x2="256" y2="26" transform="rotate(180 256 256)"/>
    <line x1="256" y1="10" x2="256" y2="20" transform="rotate(195 256 256)"/>
    <line x1="256" y1="10" x2="256" y2="26" transform="rotate(210 256 256)"/>
    <line x1="256" y1="10" x2="256" y2="20" transform="rotate(225 256 256)"/>
    <line x1="256" y1="10" x2="256" y2="26" transform="rotate(240 256 256)"/>
    <line x1="256" y1="10" x2="256" y2="20" transform="rotate(255 256 256)"/>
    <line x1="256" y1="10" x2="256" y2="26" transform="rotate(270 256 256)"/>
    <line x1="256" y1="10" x2="256" y2="20" transform="rotate(285 256 256)"/>
    <line x1="256" y1="10" x2="256" y2="26" transform="rotate(300 256 256)"/>
    <line x1="256" y1="10" x2="256" y2="20" transform="rotate(315 256 256)"/>
    <line x1="256" y1="10" x2="256" y2="26" transform="rotate(330 256 256)"/>
    <line x1="256" y1="10" x2="256" y2="20" transform="rotate(345 256 256)"/>
  </g>

  <!-- Trazos PCB -->
  <g clip-path="url(#cc)" stroke="#0055cc" stroke-width="1.2" fill="none" opacity="0.28">
    <polyline points="62,185 118,185 138,165 198,165"/>
    <polyline points="314,165 374,165 394,185 448,185"/>
    <polyline points="62,325 102,325 122,345 182,345"/>
    <polyline points="332,345 392,345 412,325 448,325"/>
    <polyline points="155,62 155,122 175,142 175,185"/>
    <polyline points="357,62 357,122 337,142 337,185"/>
    <polyline points="155,450 155,390 175,370 175,325"/>
    <polyline points="357,450 357,390 337,370 337,325"/>
    <circle cx="118" cy="185" r="3.5" fill="#0066dd" stroke="none"/>
    <circle cx="198" cy="165" r="3" fill="#0066dd" stroke="none"/>
    <circle cx="314" cy="165" r="3" fill="#0066dd" stroke="none"/>
    <circle cx="374" cy="185" r="3.5" fill="#0066dd" stroke="none"/>
    <circle cx="102" cy="325" r="3.5" fill="#0066dd" stroke="none"/>
    <circle cx="182" cy="345" r="3" fill="#0066dd" stroke="none"/>
    <circle cx="332" cy="345" r="3" fill="#0066dd" stroke="none"/>
    <circle cx="392" cy="325" r="3.5" fill="#0066dd" stroke="none"/>
    <circle cx="155" cy="122" r="3" fill="#0055bb" stroke="none"/>
    <circle cx="357" cy="122" r="3" fill="#0055bb" stroke="none"/>
    <circle cx="155" cy="390" r="3" fill="#0055bb" stroke="none"/>
    <circle cx="357" cy="390" r="3" fill="#0055bb" stroke="none"/>
  </g>

  <!-- IRN — sombra 3D -->
  <text x="262" y="298"
        font-family="Arial Black,Impact,sans-serif"
        font-size="192" font-weight="900" font-style="italic"
        text-anchor="middle" fill="#011840" opacity="0.85">IRN</text>
  <!-- IRN — texto principal con glow -->
  <text x="256" y="292"
        font-family="Arial Black,Impact,sans-serif"
        font-size="192" font-weight="900" font-style="italic"
        text-anchor="middle" fill="url(#tg)" filter="url(#tglow)">IRN</text>
</svg>